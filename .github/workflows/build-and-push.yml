name: Build and Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2 
  ECR_REGISTRY: 617998378442.dkr.ecr.ap-southeast-2.amazonaws.com

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            port: 3000
          - service: auth
            port: 3001
          - service: patient
            port: 3002
          - service: appointment
            port: 3003
          - service: prescription
            port: 3004
          - service: billing
            port: 3005
          - service: notification
            port: 3006
          - service: analytics
            port: 3007

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          echo "IMAGE=${{ env.ECR_REGISTRY }}/healthbridge-${{ matrix.service }}" >> $GITHUB_OUTPUT
          echo "SHA_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t ${{ steps.tags.outputs.IMAGE }}:latest \
            -t ${{ steps.tags.outputs.IMAGE }}:v1.0.0 \
            -t ${{ steps.tags.outputs.IMAGE }}:${{ steps.tags.outputs.SHA_TAG }} \
            .

      - name: Push all tags to ECR
        run: |
          docker push ${{ steps.tags.outputs.IMAGE }}:latest
          docker push ${{ steps.tags.outputs.IMAGE }}:v1.0.0
          docker push ${{ steps.tags.outputs.IMAGE }}:${{ steps.tags.outputs.SHA_TAG }}

      - name: Print image URI
        run: |
          echo "✅ Pushed: ${{ steps.tags.outputs.IMAGE }}:latest"
          echo "✅ Pushed: ${{ steps.tags.outputs.IMAGE }}:v1.0.0"
          echo "✅ Pushed: ${{ steps.tags.outputs.IMAGE }}:${{ steps.tags.outputs.SHA_TAG }}"

      - name: Force ECS redeployment and Debug Status
        run: |
          echo "🔄 Scanning ECS clusters for services matching healthbridge-${{ matrix.servi ce }}..."
          CLUSTERS=$(aws ecs list-clusters --query "clusterArns" --output text)
          for CLUSTER in $CLUSTERS; do
            echo "Checking cluster: $CLUSTER"
            SERVICES=$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns" --output text)
            for SERVICE in $SERVICES; do
              SVC_NAME=$(echo "$SERVICE" | awk -F/ '{print $NF}')
              if [[ "$SVC_NAME" == *"healthbridge-${{ matrix.service }}"* || "$SVC_NAME" == *"${{ matrix.service }}"* ]]; then
                echo "🚀 Force redeploying ECS service '$SVC_NAME' in cluster '$CLUSTER'..."
                aws ecs update-service --cluster "$CLUSTER" --service "$SVC_NAME" --force-new-deployment
              fi
            done
          done

          # Only run account-wide debugging in the api-gateway job to prevent logs clutter
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            echo "=== ECS Cluster & Service Discovery Debugger ==="
            mkdir -p debug-output
            
            aws servicediscovery list-namespaces --output json > debug-output/servicediscovery-namespaces.json || true
            aws servicediscovery list-services --output json > debug-output/servicediscovery-services.json || true
            
            for CLUSTER in $CLUSTERS; do
              CLUSTER_NAME=$(echo "$CLUSTER" | awk -F/ '{print $NF}')
              echo "Cluster: $CLUSTER_NAME"
              
              aws ecs describe-clusters --clusters "$CLUSTER" --output json > debug-output/cluster-${CLUSTER_NAME}.json || true
              
              SERVICES=$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns" --output text)
              for SERVICE in $SERVICES; do
                SVC_NAME=$(echo "$SERVICE" | awk -F/ '{print $NF}')
                echo "  Service: $SVC_NAME"
                aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --output json > debug-output/service-${CLUSTER_NAME}-${SVC_NAME}.json || true
              done
              
              echo "  Tasks in Cluster:"
              TASKS=$(aws ecs list-tasks --cluster "$CLUSTER" --query "taskArns" --output text)
              if [ -n "$TASKS" ] && [ "$TASKS" != "None" ]; then
                aws ecs describe-tasks --cluster "$CLUSTER" --tasks $TASKS --output json > debug-output/tasks-${CLUSTER_NAME}.json || true
              fi
            done
            
            # Commit and push debug output back to the repo
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add debug-output/
            git commit -m "chore: add ECS debug output [skip ci]" || true
            git pull --rebase origin main || true
            git push origin main || true
          fi

  update-gateway:
    name: Update Gateway IPs
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Gateway Service URLs
        run: |
          SERVICES=("auth" "patient" "appointment" "prescription" "billing" "notification" "analytics")
          declare -A IPS

          for SVC in "${SERVICES[@]}"; do
            echo "🔍 Finding tasks for healthbridge-$SVC..."
            
            # Retrieve list of task ARNs for the service
            TASK_ARNS=$(aws ecs list-tasks --cluster healthbridge --service-name healthbridge-$SVC --query "taskArns" --output json)
            
            # If no tasks are present or list is empty, wait
            for i in {1..24}; do
              if [ -z "$TASK_ARNS" ] || [ "$TASK_ARNS" == "[]" ] || [ "$TASK_ARNS" == "null" ]; then
                echo "⏳ Waiting for task to be registered..."
                sleep 5
                TASK_ARNS=$(aws ecs list-tasks --cluster healthbridge --service-name healthbridge-$SVC --query "taskArns" --output json)
              else
                break
              fi
            done
            
            if [ -z "$TASK_ARNS" ] || [ "$TASK_ARNS" == "[]" ] || [ "$TASK_ARNS" == "null" ]; then
              echo "❌ No tasks found for healthbridge-$SVC after waiting."
              exit 1
            fi
            
            # Convert JSON array of task ARNs to space-separated string
            TASK_ARNS_STR=$(echo "$TASK_ARNS" | jq -r '.[]' | tr '\n' ' ')
            
            # Find the newest task by parsing the createdAt field from describe-tasks
            echo "🔍 Describing tasks to find the newest one..."
            NEWEST_TASK_ARN=$(aws ecs describe-tasks --cluster healthbridge --tasks $TASK_ARNS_STR --query "tasks | sort_by(@, &createdAt) | [-1].taskArn" --output text)
            
            if [ -z "$NEWEST_TASK_ARN" ] || [ "$NEWEST_TASK_ARN" == "None" ]; then
              echo "❌ Failed to identify the newest task ARN for healthbridge-$SVC."
              exit 1
            fi
            
            # Wait for this specific task to be RUNNING
            echo "⏳ Waiting for task $NEWEST_TASK_ARN to reach RUNNING status..."
            STATUS=$(aws ecs describe-tasks --cluster healthbridge --tasks "$NEWEST_TASK_ARN" --query "tasks[0].lastStatus" --output text)
            for i in {1..40}; do
              if [ "$STATUS" != "RUNNING" ] && [ "$STATUS" != "PROVISIONING" ] && [ "$STATUS" != "PENDING" ] && [ "$STATUS" != "ACTIVATING" ]; then
                echo "⚠️ Unexpected status: $STATUS. Might have failed. Retrying describe..."
              fi
              if [ "$STATUS" != "RUNNING" ]; then
                echo "⏳ Status is $STATUS. Sleeping 5s..."
                sleep 5
                STATUS=$(aws ecs describe-tasks --cluster healthbridge --tasks "$NEWEST_TASK_ARN" --query "tasks[0].lastStatus" --output text)
              else
                break
              fi
            done
            
            if [ "$STATUS" != "RUNNING" ]; then
              echo "❌ Task $NEWEST_TASK_ARN failed to reach RUNNING status (current: $STATUS)."
              exit 1
            fi
            
            # Fetch the private IP address of the task
            IP=$(aws ecs describe-tasks --cluster healthbridge --tasks "$NEWEST_TASK_ARN" --query "tasks[0].attachments[0].details[?name=='privateIPv4Address'].value" --output text)
            
            if [ -z "$IP" ] || [ "$IP" == "None" ]; then
              echo "❌ Failed to retrieve private IP for task $NEWEST_TASK_ARN"
              exit 1
            fi
            
            echo "✅ healthbridge-$SVC running at private IP: $IP"
            IPS["$SVC"]=$IP
          done

          echo "📝 Fetching current task definition of healthbridge-api-gateway..."
          aws ecs describe-task-definition --task-definition healthbridge-api-gateway --query taskDefinition > task-def.json

          echo "🔄 Updating task definition environment variables with new IPs..."
          jq --arg auth "http://${IPS[auth]}:3001" \
             --arg patient "http://${IPS[patient]}:3002" \
             --arg appointment "http://${IPS[appointment]}:3003" \
             --arg prescription "http://${IPS[prescription]}:3004" \
             --arg billing "http://${IPS[billing]}:3005" \
             --arg notification "http://${IPS[notification]}:3006" \
             --arg analytics "http://${IPS[analytics]}:3007" \
             '.containerDefinitions[0].environment |= map(
                if .name == "AUTH_SERVICE_URL" then .value = $auth
                elif .name == "PATIENT_SERVICE_URL" then .value = $patient
                elif .name == "APPOINTMENT_SERVICE_URL" then .value = $appointment
                elif .name == "PRESCRIPTION_SERVICE_URL" then .value = $prescription
                elif .name == "BILLING_SERVICE_URL" then .value = $billing
                elif .name == "NOTIFICATION_SERVICE_URL" then .value = $notification
                elif .name == "ANALYTICS_SERVICE_URL" then .value = $analytics
                else . end
             )' task-def.json > updated-task-def.json

          echo "🧼 Cleaning task definition fields for registration..."
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' updated-task-def.json > final-task-def.json

          echo "🚀 Registering new task definition revision..."
          NEW_TASK_DEF=$(aws ecs register-task-definition --cli-input-json file://final-task-def.json --query "taskDefinition.taskDefinitionArn" --output text)
          echo "✅ Registered task definition: $NEW_TASK_DEF"

          echo "🔄 Updating healthbridge-api-gateway service with the new task definition..."
          aws ecs update-service --cluster healthbridge --service healthbridge-api-gateway --task-definition "$NEW_TASK_DEF" --force-new-deployment
          echo "🎉 Gateway service successfully updated!"



