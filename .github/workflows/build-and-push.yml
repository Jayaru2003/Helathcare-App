name: Build and Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2 
  ECR_REGISTRY: 617998378442.dkr.ecr.ap-southeast-2.amazonaws.com

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            port: 3000
          - service: auth
            port: 3001
          - service: patient
            port: 3002
          - service: appointment
            port: 3003
          - service: prescription
            port: 3004
          - service: billing
            port: 3005
          - service: notification
            port: 3006
          - service: analytics
            port: 3007

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          echo "IMAGE=${{ env.ECR_REGISTRY }}/healthbridge-${{ matrix.service }}" >> $GITHUB_OUTPUT
          echo "SHA_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t ${{ steps.tags.outputs.IMAGE }}:latest \
            -t ${{ steps.tags.outputs.IMAGE }}:v1.0.0 \
            -t ${{ steps.tags.outputs.IMAGE }}:${{ steps.tags.outputs.SHA_TAG }} \
            .

      - name: Push all tags to ECR
        run: |
          docker push ${{ steps.tags.outputs.IMAGE }}:latest
          docker push ${{ steps.tags.outputs.IMAGE }}:v1.0.0
          docker push ${{ steps.tags.outputs.IMAGE }}:${{ steps.tags.outputs.SHA_TAG }}

      - name: Print image URI
        run: |
          echo "✅ Pushed: ${{ steps.tags.outputs.IMAGE }}:latest"
          echo "✅ Pushed: ${{ steps.tags.outputs.IMAGE }}:v1.0.0"
          echo "✅ Pushed: ${{ steps.tags.outputs.IMAGE }}:${{ steps.tags.outputs.SHA_TAG }}"

      - name: Force ECS redeployment and Debug Status
        run: |
          echo "🔄 Scanning ECS clusters for services matching healthbridge-${{ matrix.service }}..."
          CLUSTERS=$(aws ecs list-clusters --query "clusterArns" --output text)
          for CLUSTER in $CLUSTERS; do
            echo "Checking cluster: $CLUSTER"
            SERVICES=$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns" --output text)
            for SERVICE in $SERVICES; do
              SVC_NAME=$(echo "$SERVICE" | awk -F/ '{print $NF}')
              if [[ "$SVC_NAME" == *"healthbridge-${{ matrix.service }}"* || "$SVC_NAME" == *"${{ matrix.service }}"* ]]; then
                echo "🚀 Force redeploying ECS service '$SVC_NAME' in cluster '$CLUSTER'..."
                aws ecs update-service --cluster "$CLUSTER" --service "$SVC_NAME" --force-new-deployment
              fi
            done
          done

          # Only run account-wide debugging in the api-gateway job to prevent logs clutter
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            echo "=== ECS Cluster & Service Discovery Debugger ==="
            for CLUSTER in $CLUSTERS; do
              CLUSTER_NAME=$(echo "$CLUSTER" | awk -F/ '{print $NF}')
              echo "Cluster: $CLUSTER_NAME"
              
              SERVICES=$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns" --output text)
              for SERVICE in $SERVICES; do
                SVC_NAME=$(echo "$SERVICE" | awk -F/ '{print $NF}')
                echo "  Service: $SVC_NAME"
                aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].{status:status,desired:desiredCount,running:runningCount,taskDef:taskDefinition}" --output json
              done
              
              echo "  Tasks in Cluster:"
              TASKS=$(aws ecs list-tasks --cluster "$CLUSTER" --query "taskArns" --output text)
              if [ -n "$TASKS" ] && [ "$TASKS" != "None" ]; then
                aws ecs describe-tasks --cluster "$CLUSTER" --tasks $TASKS --query "tasks[].{task:taskArn,lastStatus:lastStatus,desiredStatus:desiredStatus,stoppedReason:stoppedReason,containers:containers[].{name:name,lastStatus:lastStatus,exitCode:exitCode,reason:reason}}" --output json
              fi
            done
          fi


