name: Build and Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - auth
          - patient
          - appointment
          - prescription
          - billing
          - notification
          - analytics

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd services/${{ matrix.service }}

          docker build -t $ECR_REGISTRY/healthbridge-${{ matrix.service }}:latest \
                       -t $ECR_REGISTRY/healthbridge-${{ matrix.service }}:v1.0.0 \
                       -t $ECR_REGISTRY/healthbridge-${{ matrix.service }}:$IMAGE_TAG .

          docker push $ECR_REGISTRY/healthbridge-${{ matrix.service }} --all-tags

          echo "Pushed healthbridge-${{ matrix.service }}"
