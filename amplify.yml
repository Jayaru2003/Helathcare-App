version: 1
applications:
  - appRoot: healthbridge-web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: healthbridge-web/.next
        files:
          - '**/*'
      cache:
        paths:
          - healthbridge-web/node_modules/**/*
          - healthbridge-web/.next/cache/**/*

